# Stage 2 — instruction tuning. Unfreeze the LM, resume the aligned projector.
stage: 2
init_projector_from: checkpoints/stage1/projector.pt

model:
  vision_model: google/siglip-so400m-patch14-384
  language_model: Qwen/Qwen2.5-1.5B-Instruct
  freeze_vision: true
  freeze_language: false      # full fine-tune. For LoRA, wrap language_model with peft.
  projector_hidden_mult: 4
  attn_implementation: sdpa
  dtype: bfloat16

data:
  source:
    # LLaVA-Instruct-150k conversation format: {image, conversations:[{role,content}]}.
    type: jsonl
    path: data/llava_instruct_150k.jsonl

train:
  output_dir: checkpoints/stage2
  epochs: 1
  batch_size: 16
  grad_accum: 4
  lr: 2.0e-5                  # much lower LR for the LM
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  num_workers: 8
  log_every: 10
  seed: 0
  wandb:                   # remove this block to disable logging
    project: vlm-llava
    run_name: stage2-finetune
